<!DOCTYPE html>
<html lang="vi">
 <head>
  <title>Thiết kế from đăng nhập</title>
  <meta charset="utf-8">
  <link rel = "stylesheet" href = "../css/style2.css">
 </head>
 <body>
   <div class="container">
    <form id="frmLogin">
        <h3 class="title">Đăng nhập hệ thống</h3>
        <div class="form-group">
            <label for="txtUsername">Tên đăng nhập:</label>
            <input class="form-control" type="txt" id="txtUsername" placeholder="Nhập tên đăng nhập">
        </div>
        <div class="form-group">
            <label for="txtpassword">Mật khẩu:</label>
            <input class="form-control" type="password" id="txtpassword" placeholder="Nhập mật khẩu">
        </div>
        <input class="buttom" type="submit" name="sbLogin" value="Đăng nhập">
        <input class="buttom" type="reset" name="rsCancel" value="Hủy bỏ">
    </form>
   </div>
 </body>
</html>
