<!DOCTYPE html>
<html lang="vi">
 <head>
  <title>Thiết kế from sản phẩm</title>

  <!-- Latest compiled and minified CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Latest compiled JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <meta charset="utf-8">
    <script src="../js/lib.js"></script>
 </head>
 <body>
  <h2 align="center">Menu nước giải khát</h2>
    <br>
    <div class = "container">
        <div class = "product-list  row row-cols-2 row-cols-md-3 row-cols-lg-5 g-3" id = "product-list">

        </div>
    </div>
    <script>
        productList.forEach(function(item) {
            // Truyền từng thuộc tính vào hàm
            addProduct(item.id, item.name, item.price, item.image, item.productLink);
        });
        
       //showProduct(productList);
        
    </script>
    <div class="container mb-4">
    <h4>Quản lý sản phẩm</h4>
    
    <input id="name" class="form-control mb-2" placeholder="Tên sản phẩm">
    <input id="price" class="form-control mb-2" placeholder="Giá">
    <input id="image" class="form-control mb-2" placeholder="Link ảnh">
    
    <button class="btn btn-success" onclick="addNewProduct()">Thêm sản phẩm</button>
</div>

 </body>
