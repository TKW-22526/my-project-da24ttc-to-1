<!DOCTYPE html>
<html lang="vi">
 <head>
  <title>Thiết kế from đăng nhập</title>
  <meta charset="utf-8">
  <link rel = "stylesheet" href = "../css/style5.css">
 </head>
 <body>
   <div class="container">
    <form id="fromInBangCC">
        <h>Bảng cửu chương</h><Br>
        <label for="number">Nhập số</label>
        <input type="number" id="number" placeholder="Nhập số">
        <button type="button" onclick="InBCC()">In</button>
        <div id="kq">
        </div>
    </form>
   </div>
   <script>
    function InBCC(){
    const myForm=document.forms["fromInBangCC"];
    const myTextField=myForm.elements[0];
    let so=parseInt(document.getElementById("number").value);
    let kq="";
    for(let i=1 ; i<11;i++)
        {
            kq+=so+" X "+i+" = "+so*i+"<br>";
        }
        document.getElementById("kq").innerHTML=kq;
    }
   </script>
 </body>
</html>
