<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- File chứa productList -->
    <script src="../js/lib.js"></script>
</head>

<body>

<div class="container mt-4">

    <!-- Breadcrumb -->
    <nav>
        <a href="../index.html" class="text-decoration-none">Trang chủ</a>
        /
        <span>Chi tiết sản phẩm</span>
    </nav>

    <hr>

    <div class="row mt-4">

        <!-- Hình ảnh -->
        <div class="col-md-5">
            <img 
                src="" 
                id="img-detail"
                class="img-fluid border rounded shadow-sm"
                alt="Ảnh sản phẩm"
            >
        </div>

        <!-- Thông tin -->
        <div class="col-md-7">

            <h2 id="name-detail" class="fw-bold mb-3">
                Tên sản phẩm
            </h2>

            <h4 id="price-detail" class="text-danger mb-3">
                Giá: 0đ
            </h4>

            <p class="fw-bold mb-1">
                Mô tả sản phẩm:
            </p>

            <p 
                id="desc-detail"
                class="text-secondary"
                style="text-align: justify;"
            >
                Nội dung mô tả...
            </p>

            <button class="btn btn-primary mt-3">
                Thêm vào giỏ hàng
            </button>

        </div>

    </div>
</div>

<script>

    // Lấy id từ URL
    const queryString = window.location.search;

    const urlParams = new URLSearchParams(queryString);

    const productId = urlParams.get("id");

    // Tìm sản phẩm
    const product = productList.find(item => item.id === productId);

    // Nếu tìm thấy
    if(product){

        document.getElementById('name-detail').innerHTML =product.name;

        document.getElementById('price-detail').innerHTML ="Giá: " + product.price.toLocaleString('vi-VN') + "đ";

        document.getElementById('desc-detail').innerHTML = product.desc;

        document.getElementById('img-detail').src =product.image;

    }


</script>

</body>
</html>
