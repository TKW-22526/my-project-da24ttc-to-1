<!DOCTYPE html>
<html lang="vi">
 <head>
  <title>Hóa đơn thanh toán</title>
  <meta charset="utf-8">
  <link rel = "stylesheet" href = "../css/style4.css">
 </head>
 <body>
    <h>Hóa đơn thanh toán</h>
    <table border="1">
        <tr>
            <th>STT</th>
            <th>tên sản phẩm</th>
            <th>Số lượng</th>
            <th>Đơn giá</th>
            <th>Thành tiền</th>
        </tr>
        <tr>
            <td>1</td>
            <td>A</td>
            <td class="sl">3</td>
            <td class="dg">1000</td>
            <td class="tt"></td>
        </tr>
        <tr>
            <td>2</td>
            <td>B</td>
            <td class="sl">2</td>
            <td class="dg">2000</td>
            <td class="tt"></td>
        </tr><tr>
            <td>3</td>
            <td>C</td>
            <td class="sl">4</td>
            <td class="dg">3000</td>
            <td class="tt"></td>
        </tr>
        <tr>
            <td colspan="3">Tổng thah toán</td>
            <td colspan="2" id="TongThanhToan"></td>
        </tr>
    </table>
    <script>
        const SoLuong=document.getElementsByClassName("sl");
        const DonGia=document.getElementsByClassName("dg");
        const ThanhTien=document.getElementsByClassName("tt");
        let TongThanhToan=0;
        for(let i=0 ; i<DonGia.length;i++)
        {
            ThanhTien[i].innerHTML=SoLuong[i].innerHTML*DonGia[i].innerHTML;
            TongThanhToan+= parseInt(ThanhTien[i].innerHTML);
        }
         document.getElementById("TongThanhToan").innerHTML=TongThanhToan;
    </script>
 </body>
</html>
